<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Aksa</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 1rem; }
  .toolbar { display: flex; gap: .5rem; margin-bottom: .5rem; align-items: center; }
  .panes { display: flex; gap: 1rem; }
  .left { width: 50%; }
  #editor { border: 1px solid #ccc; }
  #editor .cm-editor { height: 24rem; }
  #errors div { color: #b00; font: 13px/1.6 ui-monospace, monospace;
                cursor: pointer; }
  #errors div:hover { text-decoration: underline; }
  .right { width: 50%; display: flex; flex-direction: column; gap: .5rem; }
  #canvas { position: relative; border: 1px solid #ccc; }
  #canvas canvas { display: block; }
  #canvas #overlay { position: absolute; inset: 0; pointer-events: none; }
  #console { height: 12rem; overflow-y: auto; background: #1e1e1e;
             color: #ddd; font: 14px/1.5 ui-monospace, monospace; padding: .5rem;
             white-space: pre-wrap; box-sizing: border-box; }
  #console .err { color: #f66; }
  #console .info { color: #8a8; }
  #console input { background: #333; color: #ddd; border: 1px solid #555;
                   font: inherit; width: 60%; }
  button { font-size: 1rem; padding: .25rem 1rem; }
</style>
</head>
<body>
  <div class="toolbar">
    <select id="locale">
      <option value="id" selected>Bahasa Indonesia</option>
      <option value="en">English</option>
    </select>
    <button id="run"></button>
    <button id="stop" disabled></button>
    <label>🐢 <input id="speed" type="range" min="1" max="10" value="5"></label>
    <button id="reset">⟲</button>
  </div>
  <div class="panes">
    <div class="left">
      <div id="editor"></div>
      <div id="errors"></div>
    </div>
    <div class="right">
      <div id="canvas">
        <canvas id="lines" width="600" height="380"></canvas>
        <canvas id="overlay" width="600" height="380"></canvas>
      </div>
      <div id="console"></div>
    </div>
  </div>
  <script src="../wasm/aksa.js"></script>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
