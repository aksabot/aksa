<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Aksa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="toolbar">
    <select id="locale">
      <option value="id" selected>Bahasa Indonesia</option>
      <option value="en">English</option>
    </select>
    <button id="run"></button>
    <button id="stop" disabled></button>
    <button id="share"></button>
    <label>🤖 <input id="speed" type="range" min="1" max="10" value="5"></label>
    <button id="reset">⟲</button>
    <select id="examples"></select>
    <a id="mode-link" href="device.html"></a>
  </div>
  <div class="panes">
    <div class="left">
      <div id="lesson"></div>
      <div id="editor"></div>
      <div id="errors"></div>
    </div>
    <div class="right">
      <div id="canvas">
        <canvas id="lines" width="600" height="380"></canvas>
        <canvas id="overlay" width="600" height="380"></canvas>
      </div>
      <div id="console"></div>
    </div>
  </div>
  <script src="../wasm/aksa.js"></script>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
