name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "CHANGELOG.md"
      - "ROADMAP.md"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Build docs
        working-directory: docs
        run: bun run build

      # Only needed for the very first run to create the Pages project.
      # The project now exists, so this step is disabled.
      # - name: Ensure Pages project exists
      #   uses: cloudflare/wrangler-action@v3
      #   with:
      #     apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      #     accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     packageManager: bun
      #     command: pages project create aksa-docs --production-branch=main
      #   continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs
          packageManager: bun
          command: pages deploy ./dist/static --project-name=aksa-docs --branch=main
